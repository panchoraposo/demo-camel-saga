apiVersion: v1
kind: ServiceAccount
metadata:
  name: loki-odf-s3-secret-job
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: loki-odf-s3-secret-job
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: loki-odf-s3-secret-job
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: loki-odf-s3-secret-job
    namespace: openshift-logging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: loki-odf-s3-secret-job
---
apiVersion: batch/v1
kind: Job
metadata:
  name: loki-odf-s3-secret-job
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: loki-odf-s3-secret-job
      containers:
        - name: ose-cli
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/bash
            - -ec
            - |
              OBC_NAME="logging-loki"

              echo "Waiting for ObjectBucketClaim secret+configmap ($OBC_NAME)..."
              until oc -n openshift-logging get secret "$OBC_NAME" >/dev/null 2>&1; do sleep 2; done
              until oc -n openshift-logging get configmap "$OBC_NAME" >/dev/null 2>&1; do sleep 2; done

              AK="$(oc -n openshift-logging get secret "$OBC_NAME" -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)"
              SK="$(oc -n openshift-logging get secret "$OBC_NAME" -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)"
              BUCKET="$(oc -n openshift-logging get configmap "$OBC_NAME" -o jsonpath='{.data.BUCKET_NAME}')"

              # Use in-cluster (non-TLS) endpoint to avoid truststore issues.
              ENDPOINT="http://s3.openshift-storage.svc.cluster.local:80"
              REGION="us-east-1"

              oc -n openshift-logging create secret generic logging-loki-s3 \
                --from-literal=access_key_id="$AK" \
                --from-literal=access_key_secret="$SK" \
                --from-literal=bucketnames="$BUCKET" \
                --from-literal=endpoint="$ENDPOINT" \
                --from-literal=region="$REGION" \
                --dry-run=client -o yaml | oc apply -f -

              echo "Updated openshift-logging/logging-loki-s3 for LokiStack"
