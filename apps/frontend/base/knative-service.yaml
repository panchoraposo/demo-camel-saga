apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: frontend
  namespace: frontend
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containers:
        - name: frontend
          image: image-registry.openshift-image-registry.svc:5000/frontend/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            initialDelaySeconds: 5
            httpGet:
              path: "/"
              port: 3000
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
