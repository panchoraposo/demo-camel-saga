apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: dev
  namespace: observability
spec:
  volumes:
    - name: tempo-gateway-mtls
      secret:
        secretName: tempo-simplest-gateway-mtls
  volumeMounts:
    - name: tempo-gateway-mtls
      mountPath: /etc/tempo-gateway-mtls
      readOnly: true
  config:
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
      jaeger:
        protocols:
          thrift_binary: {}
          thrift_compact: {}
          thrift_http: {}
          grpc: {}

    processors:

    exporters:
      debug: {}
      otlp:
        endpoint: tempo-simplest-distributor.observability.svc.cluster.local:4317
        tls:
          insecure: false
          insecure_skip_verify: true
          cert_file: /etc/tempo-gateway-mtls/tls.crt
          key_file: /etc/tempo-gateway-mtls/tls.key
        headers:
          X-Scope-OrgID: demo

    service:
      pipelines:
        traces:
          receivers: [otlp, jaeger]
          exporters: [otlp]