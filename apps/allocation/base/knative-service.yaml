apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: allocation
  namespace: allocation
spec:
  template:
    metadata:
      annotations:
        # Kafka consumer must not scale-to-zero.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        ticketblaster.redhat.demo/allocation-image-build: "c364eaa"
    spec:
      containers:
        - name: allocation
          image: image-registry.openshift-image-registry.svc:5000/allocation/allocation:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_PROFILE
              value: demo
            - name: CAMEL_COMPONENT_KAFKA_BROKERS
              value: demo-cluster-kafka-bootstrap.kafka.svc:9092
            - name: QUARKUS_OTEL_SDK_DISABLED
              value: "false"
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://dev-collector.observability.svc.cluster.local:4317
            - name: QUARKUS_OTEL_SERVICE_NAME
              value: allocation
            - name: QUARKUS_OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=demo
            - name: QUARKUS_OTEL_TRACES_SAMPLER
              value: parentbased_traceidratio
            - name: QUARKUS_OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: "/q/health/ready"
              port: 8080
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
