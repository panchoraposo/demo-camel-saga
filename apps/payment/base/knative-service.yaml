apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: payment
  namespace: payment
spec:
  template:
    metadata:
      annotations:
        # Kafka consumer must not scale-to-zero.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        ticketblaster.redhat.demo/payment-image-build: "e8d17e4"
    spec:
      containers:
        - name: payment
          image: image-registry.openshift-image-registry.svc:5000/payment/payment:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_PROFILE
              value: demo
            - name: CAMEL_COMPONENT_KAFKA_BROKERS
              value: demo-cluster-kafka-bootstrap.kafka.svc:9092
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            initialDelaySeconds: 10
            tcpSocket:
              port: 8080
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
