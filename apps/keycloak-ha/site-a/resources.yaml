apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: keycloak
type: Opaque
stringData:
  username: keycloak
  password: keycloak
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: keycloak
type: Opaque
stringData:
  username: admin
  password: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: remote-store-secret
  namespace: keycloak
type: Opaque
stringData:
  username: developer
  password: demo
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  labels:
    app: keycloak
  name: keycloak
  namespace: keycloak
spec:
  hostname:
    # Point this at your multi-site entrypoint (Global Accelerator / external LB / custom domain)
    hostname: <KEYCLOAK_URL_HERE>
  instances: 3
  features:
    enabled:
      - multi-site
  unsupported:
    podTemplate:
      spec:
        volumes:
          - name: ticketblaster-theme
            configMap:
              name: ticketblaster-keycloak-theme
              items:
                - key: theme.properties
                  path: login/theme.properties
                - key: login.ftl
                  path: login/login.ftl
                - key: styles.css
                  path: login/resources/css/styles.css
                - key: logo.svg
                  path: login/resources/img/logo.svg
        containers:
          - name: keycloak
            volumeMounts:
              - name: ticketblaster-theme
                mountPath: /opt/keycloak/themes/ticketblaster
  db:
    vendor: postgres
    # Replace with your synchronously replicated DB writer endpoint
    url: jdbc:aws-wrapper:postgresql://<AWS_AURORA_URL_HERE>:5432/keycloak
    poolMinSize: 30
    poolInitialSize: 30
    poolMaxSize: 30
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  proxy:
    headers: xforwarded
  http:
    tlsSecret: keycloak-tls-secret
  ingress:
    enabled: true
  bootstrapAdmin:
    user:
      secret: keycloak-admin-secret
  additionalOptions:
    - name: log-console-output
      value: json
    - name: metrics-enabled
      value: 'true'
    - name: event-metrics-user-enabled
      value: 'true'
    - name: cache-remote-host
      value: "infinispan.keycloak.svc"
    - name: cache-remote-port
      value: "11222"
    - name: cache-remote-username
      secret:
        name: remote-store-secret
        key: username
    - name: cache-remote-password
      secret:
        name: remote-store-secret
        key: password
    # Ensure caches exist on both sites (see HA guide)
    - name: cache-remote-backup-sites
      value: "site-b"
    - name: db-driver
      value: software.amazon.jdbc.Driver
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: ticketblaster-realm
  namespace: keycloak
spec:
  keycloakCRName: keycloak
  realm:
    id: ticketblaster
    realm: ticketblaster
    displayName: TicketBlaster Live
    loginTheme: ticketblaster
    enabled: true
    registrationAllowed: false
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false
    roles:
      realm:
        - name: admin
          description: TicketBlaster administrators
    clients:
      - clientId: frontend
        name: Frontend
        enabled: true
        publicClient: true
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        redirectUris:
          - "*"
        webOrigins:
          - "*"
    users:
      - username: johndoe
        enabled: true
        firstName: John
        lastName: Doe
        email: johndoe@example.com
        emailVerified: true
        credentials:
          - type: password
            value: demo
            temporary: false
      - username: janedoe
        enabled: true
        firstName: Jane
        lastName: Doe
        email: janedoe@example.com
        emailVerified: true
        credentials:
          - type: password
            value: demo
            temporary: false
      - username: admin
        enabled: true
        firstName: TicketBlaster
        lastName: Admin
        email: admin@ticketblaster.example
        emailVerified: true
        realmRoles:
          - admin
        credentials:
          - type: password
            value: admin
            temporary: false

