apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaoto-postgres
  namespace: kaoto
  labels:
    app: kaoto-postgres
    app.openshift.io/runtime: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaoto-postgres
  template:
    metadata:
      labels:
        app: kaoto-postgres
    spec:
      containers:
        - name: kaoto-postgres
          image: registry.redhat.io/rhel10/postgresql-16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: kaoto
            - name: POSTGRESQL_PASSWORD
              value: kaoto
            - name: POSTGRESQL_DATABASE
              value: kaoto
          volumeMounts:
            - mountPath: /var/lib/pgsql/data
              name: postgres-storage
      volumes:
        - name: postgres-storage
          emptyDir: {}

