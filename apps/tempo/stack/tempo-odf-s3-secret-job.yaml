apiVersion: v1
kind: ServiceAccount
metadata:
  name: tempo-odf-s3-secret-job
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tempo-odf-s3-secret-job
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tempo-odf-s3-secret-job
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: tempo-odf-s3-secret-job
    namespace: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tempo-odf-s3-secret-job
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tempo-odf-s3-secret-job
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: tempo-odf-s3-secret-job
      containers:
        - name: ose-cli
          image: registry.redhat.io/openshift4/ose-cli:v4.20
          command:
            - /bin/bash
            - -ec
            - |
              OBC_NAME="tempo-traces"

              echo "Waiting for ObjectBucketClaim secret+configmap ($OBC_NAME)..."
              until oc -n observability get secret "$OBC_NAME" >/dev/null 2>&1; do sleep 2; done
              until oc -n observability get configmap "$OBC_NAME" >/dev/null 2>&1; do sleep 2; done

              AK="$(oc -n observability get secret "$OBC_NAME" -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)"
              SK="$(oc -n observability get secret "$OBC_NAME" -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)"
              BUCKET="$(oc -n observability get configmap "$OBC_NAME" -o jsonpath='{.data.BUCKET_NAME}')"

              # Use in-cluster (non-TLS) endpoint to avoid truststore issues.
              ENDPOINT="http://s3.openshift-storage.svc.cluster.local:80"

              oc -n observability create secret generic tempo-s3-odf \
                --from-literal=access_key_id="$AK" \
                --from-literal=access_key_secret="$SK" \
                --from-literal=bucket="$BUCKET" \
                --from-literal=endpoint="$ENDPOINT" \
                --dry-run=client -o yaml | oc apply -f -

              echo "Updated observability/tempo-s3-odf for TempoStack"

