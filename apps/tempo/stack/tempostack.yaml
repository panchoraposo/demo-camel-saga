apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: simplest
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  managementState: Managed
  replicationFactor: 1
  # Sandbox clusters are often single-node and NetworkPolicies can block ingestion
  # (e.g. collector -> distributor). Disable to keep the demo reliable.
  networkPolicy:
    enabled: false
  tenants:
    mode: openshift
    authentication:
      - tenantName: demo
        tenantId: demo
  retention:
    global:
      traces: 24h
  storage:
    secret:
      name: tempo-s3-odf
      type: s3
  storageSize: 1Gi
  resources:
    total:
      limits:
        cpu: "1000m"
        memory: "2Gi"
  template:
    gateway:
      enabled: true
      component:
        replicas: 1
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            cpu: 100m
            memory: 256Mi
      ingress:
        type: route
        route:
          termination: edge
      rbac:
        enabled: true
    distributor:
      component:
        replicas: 1
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            cpu: 150m
            memory: 384Mi
    ingester:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          cpu: 200m
          memory: 1Gi
    querier:
      replicas: 1
      resources:
        requests:
          cpu: 25m
          memory: 192Mi
        limits:
          cpu: 150m
          memory: 512Mi
    queryFrontend:
      component:
        replicas: 1
        resources:
          requests:
            cpu: 25m
            memory: 192Mi
          limits:
            cpu: 150m
            memory: 512Mi
    compactor:
      replicas: 1
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          cpu: 150m
          memory: 384Mi
    # Traces are surfaced via the OpenShift Console plugin; with gateway + multitenancy
    # enabled, we avoid exposing Jaeger Query directly.
  observability:
    metrics:
      createServiceMonitors: true
