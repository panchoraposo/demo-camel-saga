apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: simplest
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  managementState: Managed
  # Keep this cluster-friendly (single-node / low resources).
  size: 1x.pico
  replicationFactor: 1
  tenants:
    mode: openshift
    authentication:
      - tenantName: demo
        tenantId: demo
  retention:
    global:
      traces: 24h
  storage:
    secret:
      name: tempo-s3-odf
      type: s3
  storageSize: 1Gi
  resources:
    total:
      limits:
        cpu: "1000m"
        memory: "2Gi"
  template:
    gateway:
      enabled: true
      component:
        replicas: 1
      ingress:
        type: route
        route:
          termination: edge
      rbac:
        enabled: true
    distributor:
      component:
        replicas: 1
    ingester:
      replicas: 1
    querier:
      replicas: 1
    queryFrontend:
      component:
        replicas: 1
    compactor:
      replicas: 1
    # Traces are surfaced via the OpenShift Console plugin; with gateway + multitenancy
    # enabled, we avoid exposing Jaeger Query directly.
  observability:
    metrics:
      createServiceMonitors: true
