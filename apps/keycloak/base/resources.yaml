apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
type: Opaque
stringData:
  postgres-user: keycloak
  postgres-password: keycloak
  keycloak-admin: admin
  keycloak-admin-password: admin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-postgres
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-postgres
  template:
    metadata:
      labels:
        app: keycloak-postgres
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-15:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: postgres-user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: postgres-password
            - name: POSTGRESQL_DATABASE
              value: keycloak
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: keycloak-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
spec:
  selector:
    app: keycloak-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
data:
  realm.json: |
    {
      "realm": "camel-saga",
      "enabled": true,
      "displayName": "Camel Quarkus SAGA Demo",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "clients": [
        {
          "clientId": "frontend",
          "name": "Frontend",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": ["*"],
          "webOrigins": ["*"]
        }
      ],
      "users": [
        {
          "username": "johndoe",
          "enabled": true,
          "email": "johndoe@example.com",
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
        },
        {
          "username": "janedoe",
          "enabled": true,
          "email": "janedoe@example.com",
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
        },
        {
          "username": "alice",
          "enabled": true,
          "email": "alice@example.com",
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
        },
        {
          "username": "bob",
          "enabled": true,
          "email": "bob@example.com",
