apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
type: Opaque
stringData:
  username: keycloak
  password: keycloak
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
type: Opaque
stringData:
  username: admin
  password: admin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-postgres
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-postgres
  template:
    metadata:
      labels:
        app: keycloak-postgres
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-15:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: password
            - name: POSTGRESQL_DATABASE
              value: keycloak
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: keycloak-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
spec:
  selector:
    app: keycloak-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
spec:
  instances: 1
  db:
    vendor: postgres
    host: keycloak-postgres
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  http:
    httpEnabled: true
  ingress:
    className: openshift-default
  proxy:
    headers: xforwarded
  hostname:
    strict: false
  bootstrapAdmin:
    user:
      secret: keycloak-admin-secret
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: ticketblaster-realm
spec:
  keycloakCRName: keycloak
  realm:
    id: ticketblaster
    realm: ticketblaster
    displayName: TicketBlaster Live
    enabled: true
    registrationAllowed: false
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false
    clients:
      - clientId: frontend
        name: Frontend
        enabled: true
        publicClient: true
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        redirectUris:
          - "*"
        webOrigins:
          - "*"
    users:
      - username: johndoe
        enabled: true
        firstName: John
        lastName: Doe
        email: johndoe@example.com
        emailVerified: true
        credentials:
          - type: password
            value: demo
            temporary: false
      - username: janedoe
        enabled: true
        firstName: Jane
        lastName: Doe
        email: janedoe@example.com
        emailVerified: true
        credentials:
          - type: password
            value: demo
            temporary: false
      - username: alice
        enabled: true
        firstName: Alice
        lastName: Demo
        email: alice@example.com
        emailVerified: true
        credentials:
          - type: password
            value: demo
            temporary: false
      - username: bob
        enabled: true
        firstName: Bob
        lastName: Demo
        email: bob@example.com
        emailVerified: true
        credentials:
          - type: password
            value: demo
            temporary: false

