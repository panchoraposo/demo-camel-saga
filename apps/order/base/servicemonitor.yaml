apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order
  namespace: order
  labels:
    app: order
spec:
  selector:
    matchLabels:
      ticketblaster.redhat.demo/component: metrics
  endpoints:
    - port: metrics
      path: /q/metrics
      interval: 30s
      scrapeTimeout: 10s
