apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: order
  namespace: order
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        ticketblaster.redhat.demo/order-image-build: "8fba084"
      labels:
        app: order
        app.openshift.io/runtime: camel
    spec:
      containers:
        - name: user-container
          image: image-registry.openshift-image-registry.svc:5000/order/order:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_PROFILE
              value: demo
            - name: CAMEL_COMPONENT_KAFKA_BROKERS
              value: demo-cluster-kafka-bootstrap.kafka.svc:9092
            - name: QUARKUS_OTEL_SDK_DISABLED
              value: "false"
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://dev-collector.observability.svc.cluster.local:4317
            - name: QUARKUS_OTEL_SERVICE_NAME
              value: order
            - name: QUARKUS_OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=demo
            - name: QUARKUS_OTEL_TRACES_SAMPLER
              value: parentbased_traceidratio
            - name: QUARKUS_OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
            - name: QUARKUS_OIDC_AUTH_SERVER_URL
              value: https://keycloak-ingress-keycloak.apps.cluster-98dhw.98dhw.sandbox2317.opentlc.com/realms/ticketblaster
            - name: QUARKUS_OIDC_TOKEN_PRINCIPAL_CLAIM
              value: preferred_username
            - name: QUARKUS_OIDC_TLS_VERIFICATION
              value: none
            # Admin-only: restrict viewing all orders.
            # Quarkus resolves roles from Keycloak access tokens at realm_access.roles.
            - name: QUARKUS_OIDC_ROLES_ROLE_CLAIM_PATH
              value: realm_access/roles
            - name: QUARKUS_HTTP_AUTH_PERMISSION_ADMIN_PATHS
              value: /orders,/orders/*
            - name: QUARKUS_HTTP_AUTH_PERMISSION_ADMIN_POLICY
              value: admin-policy
            - name: QUARKUS_HTTP_AUTH_POLICY_ADMIN_POLICY_ROLES_ALLOWED
              value: admin
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: "/q/health/ready"
              port: 8080
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
