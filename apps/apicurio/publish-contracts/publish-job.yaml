apiVersion: batch/v1
kind: Job
metadata:
  name: publish-demo-contracts
  namespace: apicurio-registry
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: publisher
          image: quay.io/curl/curl:latest
          env:
            - name: REGISTRY_BASE_URL
              value: http://apicurio-service.apicurio-registry.svc.cluster.local:8080/apis/registry/v2
            - name: GROUP_ID
              value: ticketblaster
          volumeMounts:
            - name: schemas
              mountPath: /contracts
              readOnly: true
          command:
            - /bin/sh
            - -ec
            - |
              echo "Waiting for Apicurio Registry..."
              until curl -fsS "$REGISTRY_BASE_URL/system/info" >/dev/null; do sleep 2; done

              create_or_update() {
                ARTIFACT_ID="$1"
                TYPE="$2"
                FILE="$3"
                CONTENT_TYPE="${4:-application/json}"

                # Create with explicit artifactId. If it already exists, update it.
                CODE="$(curl -sS -o /tmp/publish-resp.json -w '%{http_code}' -X POST \
                  -H "X-Registry-ArtifactType: $TYPE" \
                  -H "X-Registry-ArtifactId: $ARTIFACT_ID" \
                  -H "Content-Type: $CONTENT_TYPE" \
                  "$REGISTRY_BASE_URL/groups/$GROUP_ID/artifacts" \
                  --data-binary "@$FILE" || true)"

                if [ "$CODE" = "200" ] || [ "$CODE" = "201" ]; then
                  echo "Created $ARTIFACT_ID ($TYPE)"
                  return 0
                fi

                if [ "$CODE" != "409" ]; then
                  echo "Failed creating $ARTIFACT_ID ($TYPE): HTTP $CODE"
                  cat /tmp/publish-resp.json || true
                  return 1
                fi

                curl -fsS -o /dev/null -X PUT \
                  -H "X-Registry-ArtifactType: $TYPE" \
                  -H "Content-Type: $CONTENT_TYPE" \
                  "$REGISTRY_BASE_URL/groups/$GROUP_ID/artifacts/$ARTIFACT_ID" \
                  --data-binary "@$FILE"
                echo "Updated $ARTIFACT_ID ($TYPE)"
              }

              set_meta() {
                ARTIFACT_ID="$1"
                NAME="$2"
                DESCRIPTION="$3"

                cat > /tmp/meta.json <<EOF
              {"name":"$NAME","description":"$DESCRIPTION"}
EOF

                curl -fsS -o /dev/null -X PUT \
                  -H "Content-Type: application/json" \
                  "$REGISTRY_BASE_URL/groups/$GROUP_ID/artifacts/$ARTIFACT_ID/meta" \
                  --data-binary @/tmp/meta.json
              }

              echo "Publishing Avro schemas..."
              create_or_update OrderEvent AVRO /contracts/order-event.avsc
              set_meta OrderEvent "Ticketblaster OrderEvent" "Avro envelope used at runtime for all saga Kafka topics (order-events, seat-events, payment-events, compensation-events). The saga step is identified by the eventType field."
      volumes:
        - name: schemas
          configMap:
            name: ticketblaster-avro-schemas
