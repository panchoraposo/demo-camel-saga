apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Wave -1: namespaces (idempotent, avoid CreateNamespace hooks)
  - namespaces.yaml

  # Wave 0: platform operators (CRDs first)
  - apps/kafka-operator.yaml
  - apps/keycloak-operator.yaml
  - apps/datagrid-operator.yaml
  - apps/knative-operator.yaml
  - apps/amq-streams-console-operator.yaml
  - apps/opentelemetry-operator.yaml
  - apps/tempo-operator.yaml
  - apps/logging-operator.yaml
  - apps/loki-operator.yaml
  - apps/cluster-observability-operator.yaml
  - apps/service-registry-operator.yaml
  - apps/odf-operator.yaml
  - apps/devspaces-operator.yaml

  # Wave 10+: platform instances
  - apps/demo-cluster.yaml
  - apps/app-keycloak.yaml
  - apps/knative-serving.yaml
  - apps/app-amq-streams-console.yaml
  - apps/app-kafka-ui.yaml
  - apps/odf-mcg.yaml
  - apps/tempo-stack.yaml
  - apps/opentelemetry-collector.yaml
  - apps/logging-stack.yaml
  - apps/apicurio-registry.yaml
  - apps/devspaces.yaml
  - apps/observability-ui-plugins.yaml

  # Wave 50+: demo microservices (generated)
  - appsets/demo-apps.yaml

  # Wave 60+: publish contracts to Apicurio
  - apps/apicurio-contracts.yaml
