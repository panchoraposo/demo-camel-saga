apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo-stack
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  ignoreDifferences:
    - group: tempo.grafana.com
      kind: TempoStack
      jsonPointers:
        - /spec
  source:
    repoURL: 'https://github.com/panchoraposo/demo-camel-saga.git'
    targetRevision: HEAD
    path: apps/tempo/stack
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
