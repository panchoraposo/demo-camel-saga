apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datagrid-ha-site-b
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "90"
spec:
  project: default
  source:
    repoURL: 'https://github.com/panchoraposo/demo-camel-saga'
    targetRevision: HEAD
    path: apps/datagrid-ha/site-b
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
