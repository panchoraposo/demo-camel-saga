apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storagesystem
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: 'https://github.com/panchoraposo/camel-quarkus-saga-gitops'
    targetRevision: HEAD
    path: apps/odf/storage-system
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openshift-storage
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
